steps:
  - script: |
      docker stop $(APP_NAME)_$(CI_COMMIT_SHORT_SHA) $(APP_NAME)_keycloak_$(CI_COMMIT_SHORT_SHA) $(APP_NAME)_kafka_$(CI_COMMIT_SHORT_SHA)
      docker rm $(APP_NAME)_$(CI_COMMIT_SHORT_SHA) $(APP_NAME)_keycloak_$(CI_COMMIT_SHORT_SHA) $(APP_NAME)_kafka_$(CI_COMMIT_SHORT_SHA)
      docekr network rm $(APP_NAME)_network_$(CI_COMMIT_SHORT_SHA)
    displayName: Clean Up
